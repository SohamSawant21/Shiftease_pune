<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed-variant": "#004786",
                        "on-tertiary-fixed": "#311300",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed": "#ffdbc7",
                        "on-surface-variant": "#414752",
                        "outline-variant": "#c1c6d4",
                        "primary": "#005dac",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#717783",
                        "on-primary-fixed": "#001c3a",
                        "surface-dim": "#dadada",
                        "surface-container-low": "#f3f3f3",
                        "on-background": "#1a1c1c",
                        "surface-container-highest": "#e2e2e2",
                        "primary-fixed-dim": "#a5c8ff",
                        "on-tertiary-container": "#fffeff",
                        "surface-container": "#eeeeee",
                        "tertiary-fixed-dim": "#ffb688",
                        "surface": "#f9f9f9",
                        "surface-tint": "#005faf",
                        "inverse-primary": "#a5c8ff",
                        "on-error-container": "#93000a",
                        "secondary-container": "#dfe0e0",
                        "on-primary-container": "#fffdff",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e8e8e8",
                        "on-tertiary-fixed-variant": "#733600",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-error": "#ffffff",
                        "on-surface": "#1a1c1c",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2f3131",
                        "on-secondary-container": "#616363",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-secondary": "#ffffff",
                        "secondary": "#5d5f5f",
                        "primary-fixed": "#d4e3ff",
                        "background": "#f9f9f9",
                        "primary-container": "#1976d2",
                        "inverse-on-surface": "#f1f1f1",
                        "tertiary": "#944700",
                        "tertiary-container": "#ba5b00",
                        "on-secondary-fixed-variant": "#454747",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#e2e2e2"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: linear-gradient(15deg, #005DAC 0%, #1976D2 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none h-16 flex items-center justify-between px-6 w-full">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-sans antialiased headline-sm font-semibold tracking-tight text-blue-700 dark:text-blue-400">Shiftease Pune</h1>
</div>
</header>
<main class="pt-24 pb-12 px-6 max-w-lg mx-auto">
<!-- Editorial Header Section -->
<div class="mb-12">
<h2 class="text-[2.25rem] font-black leading-tight text-on-surface tracking-tight mb-2">
                Select Your Role
            </h2>
<div class="h-1.5 w-16 editorial-gradient rounded-full"></div>
<p class="body-lg text-on-surface-variant mt-4 font-medium">
                Choose how you want to use Shiftease today. You can always switch later in settings.
            </p>
</div>
<!-- Role Selection Canvas -->
<div class="space-y-6">
<!-- Role Card 1: Need Help -->
<button class="w-full text-left group transition-all duration-300">
<div class="bg-surface-container-lowest p-8 rounded-xl flex items-center gap-6 shadow-[0_12px_32px_rgba(26,28,28,0.04)] border border-transparent group-hover:border-primary/20 group-active:scale-[0.98]">
<div class="w-20 h-20 shrink-0 bg-primary-fixed rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="local_shipping" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
<div class="flex-grow">
<h3 class="text-xl font-bold text-on-surface mb-1">Need Help</h3>
<p class="body-md text-on-surface-variant">Post a shifting request</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Role Card 2: I Want Work -->
<button class="w-full text-left group transition-all duration-300">
<div class="bg-surface-container-lowest p-8 rounded-xl flex items-center gap-6 shadow-[0_12px_32px_rgba(26,28,28,0.04)] border border-transparent group-hover:border-primary/20 group-active:scale-[0.98]">
<div class="w-20 h-20 shrink-0 bg-tertiary-fixed rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="work" style="font-variation-settings: 'FILL' 1;">work</span>
</div>
<div class="flex-grow">
<h3 class="text-xl font-bold text-on-surface mb-1">I Want Work</h3>
<p class="body-md text-on-surface-variant">Find and accept jobs</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</div>
<!-- Decorative Info Chip -->
<!-- Visual Anchor (Bottom Image) -->
</main>
<!-- Suppressed Nav Shell for Focused Task (Role Selection) as per UX Goal -->
</body></html>
